name: Build RunPod images

# Build the CPU and GPU job images and publish them to GHCR. The repo source is
# pulled at pod start, so only a dependency or infra change needs a rebuild.
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - uv.lock
      - infra/runpod/**
      - .github/workflows/docker.yml
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [cpu, gpu]
    steps:
      # The GPU base image is ~10 GB; reclaim runner disk before pulling it.
      - name: Free disk space
        if: matrix.target == 'gpu'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/runpod/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/adeneley/vecml-${{ matrix.target }}:latest
            ghcr.io/adeneley/vecml-${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}
          # Export a lean cache for the large GPU image to avoid disk pressure.
          cache-to: type=gha,scope=${{ matrix.target }},mode=${{ matrix.target == 'gpu' && 'min' || 'max' }}
