name: images

# Builds and pushes the RunPod job images. Triggers only on changes that
# actually require a rebuild (deps, Dockerfile, startup.sh) or on demand:
#   gh workflow run images
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - uv.lock
      - infra/runpod/Dockerfile
      - infra/runpod/startup.sh
      - .github/workflows/images.yml

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [cpu, gpu]
    permissions:
      contents: read
      packages: write
    steps:
      # The gpu image builds on a ~12GB CUDA base; stock runners run out of
      # disk without evicting the preinstalled toolchains first.
      - name: Free runner disk (gpu only)
        if: matrix.target == 'gpu'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/runpod/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vecml-${{ matrix.target }}:latest
            ghcr.io/${{ github.repository_owner }}/vecml-${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
