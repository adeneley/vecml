[project]
name = "vecml"
version = "0.1.0"
description = "Neural front-end (cleanup + segmentation) for the vectorizer engine"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.5",
    "torchvision",
    "numpy",
    "pillow",
    "opencv-python-headless",
    "webdataset",
    "pyyaml",
    "tqdm",
]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vecml"]

[tool.ruff]
line-length = 100
